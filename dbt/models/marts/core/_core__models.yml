version: 2

models:
  - name: dim_players
    description: "Player-level dimension that centralizes username mapping between original username and global username."
    data_tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('int_players')
    columns:
      - name: players_sk
        description: "Hash surrogate key for player grain (username)."
        data_tests:
          - not_null
          - unique
      - name: username
        description: "Original player username used as the player primary key."
        data_tests:
          - not_null
          - unique
      - name: username_global
        description: "Global mapped username from username_mapping; falls back to original username when no mapping exists."
        data_tests:
          - not_null

  - name: dim_games
    description: "Games data with few calculated fields that can be directly derived w/o any join."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - uuid
            - username
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('int_games_filtered')
    columns:
      - name: players_sk
        description: "Hash foreign key to dim_players (username)."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_players')
              field: players_sk
      - name: games_sk
        description: "Hash surrogate key for the game grain (uuid + username)."
        data_tests:
          - not_null
          - unique
      - name: archive_url
        description: "{{ doc('archive_url') }}"
      - name: username
        description: "{{ doc('username') }}"
        data_tests:
          - not_null
      - name: url
        description: "{{ doc('url') }}"
      - name: pgn
        description: "{{ doc('pgn') }}"
      - name: time_control
        description: "{{ doc('time_control') }}"
      - name: end_time
        description: "\n          {{ doc('end_time') }} \n          Expressed in the timezone {{ var('data_conversion')['utc_to_target_timezone'] }}\n          "
      - name: rated
        description: "{{ doc('rated') }}"
      - name: tcn
        description: "{{ doc('tcn') }}"
      - name: uuid
        description: "{{ doc('uuid') }}"
        data_tests:
          - not_null
      - name: initial_setup
        description: "{{ doc('initial_setup') }}"
      - name: fen
        description: "{{ doc('fen') }}"
      - name: time_class
        description: "{{ doc('time_class') }}"
      - name: rules
        description: "{{ doc('rules') }}"
      - name: white__username
        description: "{{ doc('white__username') }}"
      - name: white__rating
        description: "{{ doc('white__rating') }}"
      - name: white__result
        description: "{{ doc('white__result') }}"
      - name: white__aid
        description: "{{ doc('white__aid') }}"
      - name: white__uuid
        description: "{{ doc('white__uuid') }}"
      - name: black__username
        description: "{{ doc('black__username') }}"
      - name: black__rating
        description: "{{ doc('black__rating') }}"
      - name: black__result
        description: "{{ doc('black__result') }}"
      - name: black__aid
        description: "{{ doc('black__aid') }}"
      - name: black__uuid
        description: "{{ doc('black__uuid') }}"
      - name: end_time_date
        description: "{{ doc('end_time_date') }}"
      - name: end_time_month
        description: "{{ doc('end_time_month') }}"
      - name: playing_as
        description: "{{ doc('playing_as') }}"
        data_tests:
          - not_null
      - name: playing_result_detailed
        description: "{{ doc('playing_result_detailed') }}"
        data_tests:
          - not_null
      - name: playing_rating
        description: "{{ doc('playing_rating') }}"
        data_tests:
          - not_null
      - name: opponent_rating
        description: "{{ doc('opponent_rating') }}"
        data_tests:
          - not_null
      - name: playing_result
        description: "{{ doc('playing_result') }}"
      - name: accuracies__white
        description: "{{ doc('accuracies__white') }}"
      - name: accuracies__black
        description: "{{ doc('accuracies__black') }}"
      - name: eco
        description: "{{ doc('eco') }}"
      - name: log_timestamp
        description: "{{ doc('log_timestamp') }}"
      - name: _dlt_load_id
        description: "{{ doc('_dlt_load_id') }}"
      - name: _dlt_id
        description: "{{ doc('_dlt_id') }}"
      - name: start_time
        description: "{{ doc('start_time') }}"
      - name: tournament
        description: "{{ doc('tournament') }}"
      - name: match
        description: "{{ doc('match') }}"

  - name: dim_games_openings
    description: "One row per game and user with opening-level enrichment from the intermediate openings model."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - uuid
            - username
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('int_games_openings')
    columns:
      - name: players_sk
        description: "Hash foreign key to dim_players (username)."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_players')
              field: players_sk
      - name: games_sk
        description: "Hash foreign key to dim_games (uuid + username)."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_games')
              field: games_sk

  - name: fct_games_stats
    description: "One row per game and user with aggregated game-level quality and blunder statistics."
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - uuid
            - username
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('int_games_stats')
    columns:
      - name: players_sk
        description: "Hash foreign key to dim_players (username)."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_players')
              field: players_sk
      - name: games_sk
        description: "Hash foreign key to dim_games (uuid + username)."
        data_tests:
          - not_null
          - unique
          - relationships:
              to: ref('dim_games')
              field: games_sk

  - name: fct_game_moves
    description: "\n      Games and games moves joined together, making it possible to calculate score variations, blunders, ELO ranges, game phases, etc.\n      "
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - uuid
            - username
            - move_number
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('int_game_moves_enriched')
    columns:
      - name: players_sk
        description: "Hash foreign key to dim_players (username)."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_players')
              field: players_sk
      - name: games_sk
        description: "Hash foreign key to dim_games (uuid + username)."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_games')
              field: games_sk
      - name: uuid
        description: "{{ doc('uuid') }}"
      - name: archive_url
        description: "{{ doc('archive_url') }}"
      - name: username
        description: "{{ doc('username') }}"
      - name: url
        description: "{{ doc('url') }}"
      - name: end_time
        description: "\n          {{ doc('end_time') }} \n          Expressed in the timezone {{ var('data_conversion')['utc_to_target_timezone'] }}\n          "
      - name: end_time_date
        description: "{{ doc('end_time_date') }}"
      - name: end_time_month
        description: "{{ doc('end_time_month') }}"
      - name: time_class
        description: "{{ doc('time_class') }}"
      - name: white__username
        description: "{{ doc('white__username') }}"
      - name: white__rating
        description: "{{ doc('white__rating') }}"
      - name: black__username
        description: "{{ doc('black__username') }}"
      - name: black__rating
        description: "{{ doc('black__rating') }}"
      - name: move_number
        description: "{{ doc('move_number') }}"
      - name: move
        description: "{{ doc('move') }}"
      - name: game_phase
        description: "{{ doc('game_phase') }}"
      - name: player_color_turn
        description: "{{ doc('player_color_turn') }}"
      - name: playing_as
        description: "{{ doc('playing_as') }}"
      - name: is_playing_turn
        description: "{{ doc('is_playing_turn') }}"
      - name: playing_turn_name
        description: "{{ doc('playing_turn_name') }}"
      - name: playing_rating
        description: "{{ doc('playing_rating') }}"
      - name: playing_rating_range
        description: "{{ doc('playing_rating_range') }}"
      - name: opponent_rating
        description: "{{ doc('opponent_rating') }}"
      - name: opponent_rating_range
        description: "{{ doc('opponent_rating_range') }}"
      - name: playing_result
        description: "{{ doc('playing_result') }}"
      - name: score_playing
        description: "{{ doc('score_playing') }}"
      - name: win_probability_playing
        description: "{{ doc('win_probability_playing') }}"
      - name: prev_score_playing
        description: "{{ doc('prev_score_playing') }}"
      - name: variance_score_playing
        description: "{{ doc('variance_score_playing') }}"
      - name: miss_category_playing
        description: "\n          {{ doc('miss_category_playing') }}.\n          A 'Massive Blunder' is any score variance decrease beyond {{ var('score_thresholds')['variance_score_massive_blunder'] }}.\n          A 'Blunder' is any score variance decrease between {{ var('score_thresholds')['variance_score_blunder'] }} and {{ var('score_thresholds')['variance_score_massive_blunder'] }}.\n          A 'Mistake' is any score variance decrease between {{ var('score_thresholds')['variance_score_mistake'] }} and {{ var('score_thresholds')['variance_score_blunder'] }}.\n          Remark:\n            miss_category for 'Massive Blunder' and 'Blunder' are defined only if they respect two conditions\n            (1) the previous disadvantage does not exceed -{{ var('score_thresholds')['score_balanced_limit'] }}, and \n            (2) the resulting position is below +{{ var('score_thresholds')['score_balanced_limit'] }}.\n          Otherwise, it means the situation was already massively imbalanced or remains favorable.\n          "
      - name: miss_move_number_playing
        description: "{{ doc('miss_move_number_playing') }}"
      - name: massive_blunder_move_number_playing
        description: "{{ doc('massive_blunder_move_number_playing') }}"
      - name: miss_category_opponent
        description: "\n          {{ doc('miss_category_opponent') }}.\n          A 'Massive Blunder' is any score variance decrease beyond {{ var('score_thresholds')['variance_score_massive_blunder'] }}.\n          A 'Blunder' is any score variance decrease between {{ var('score_thresholds')['variance_score_blunder'] }} and {{ var('score_thresholds')['variance_score_massive_blunder'] }}.\n          A 'Mistake' is any score variance decrease between {{ var('score_thresholds')['variance_score_mistake'] }} and {{ var('score_thresholds')['variance_score_blunder'] }}.\n          Remark:\n            miss_category for 'Massive Blunder' and 'Blunder' are defined only if they respect two conditions\n            (1) the previous disadvantage does not exceed -{{ var('score_thresholds')['score_balanced_limit'] }}, and \n            (2) the resulting position is below +{{ var('score_thresholds')['score_balanced_limit'] }}.\n          Otherwise, it means the situation was already massively imbalanced or remains favorable.\n          "
      - name: miss_move_number_opponent
        description: "{{ doc('miss_move_number_opponent') }}"
      - name: position_status_playing
        description: "\n          {{ doc('position_status_playing') }}\n          An advantage/disadvantage is defined by a score of +/- {{ var('score_thresholds')['even_score_limit'] }}.\n          "
      - name: prev_position_status_playing
        description: "{{ doc('prev_position_status_playing') }}"
      - name: miss_context_playing
        description: "{{ doc('miss_context_playing') }}"
      - name: position_status_opponent
        description: "{{ doc('position_status_opponent') }}"
      - name: prev_position_status_opponent
        description: "{{ doc('prev_position_status_opponent') }}"
      - name: miss_context_opponent
        description: "{{ doc('miss_context_opponent') }}"
      - name: log_timestamp
        description: "{{ doc('log_timestamp') }}"
      - name: time_control
        description: "{{ doc('time_control') }}"
      - name: time_remaining_seconds
        description: "{{ doc('time_remaining_seconds') }}"
      - name: prct_time_remaining
        description: "{{ doc('prct_time_remaining') }}"
      - name: eco
        description: "{{ doc('eco') }}"