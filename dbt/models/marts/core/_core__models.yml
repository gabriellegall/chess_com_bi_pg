version: 2

models:
  - name: dim_players
    description: "Publishes the conformed player dimension with stable surrogate keys and identity rollup, so all downstream facts and analytics join to one player entity definition."
    data_tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('int_players_base')
    columns:
      - name: players_sk
        description: "{{ doc('players_sk') }}"
        data_tests:
          - not_null
          - unique
      - name: username
        description: "{{ doc('username') }}"
      - name: username_global
        description: "{{ doc('username_global') }}"

  - name: dim_games
    description: "Publishes the conformed game dimension at one row per game and player, carrying scoped game attributes and durable keys for fact joins."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - uuid
            - username
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: ref('int_games_filtered')
    columns:
      - name: players_sk
        description: "{{ doc('players_sk') }}"
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_players')
              field: players_sk
      - name: games_sk
        description: "{{ doc('games_sk') }}"
        data_tests:
          - not_null
