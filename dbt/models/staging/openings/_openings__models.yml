version: 2

models:
  - name: stg_openings__chess_openings
    description: "Exposes the raw openings reference dataset as a stable contract so enrichment logic can map played move sequences to standardized opening metadata."
    columns:
      - name: eco-volume
        description: "{{ doc('openings_eco_1char') }}"
      - name: eco
        description: "{{ doc('openings_eco_3char') }}"
      - name: name
        description: "{{ doc('openings_name') }}"
      - name: pgn
        description: "{{ doc('openings_pgn') }}"
      - name: uci
        description: "{{ doc('openings_uci') }}"
      - name: epd
        description: "{{ doc('openings_epd') }}"
      - name: log_timestamp
        description: "{{ doc('log_timestamp') }}"